<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Photo Cleaner</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --cream: #faf8f5;
    --sand: #e8e2d9;
    --clay: #c9b8a8;
    --terracotta: #c17a5b;
    --deep: #2a1f1a;
    --accent: #d4956a;
  }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--cream);
    color: var(--deep);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 2rem 1rem 4rem;
  }

  /* Decorative background */
  body::before {
    content: '';
    position: fixed;
    top: -30%;
    right: -20%;
    width: 70vw;
    height: 70vw;
    border-radius: 50%;
    background: radial-gradient(circle, #e8d5c4 0%, transparent 70%);
    pointer-events: none;
    z-index: 0;
  }

  header {
    position: relative;
    z-index: 1;
    text-align: center;
    margin-bottom: 2.5rem;
  }

  .logo-badge {
    display: inline-flex;
    align-items: center;
    gap: 0.4rem;
    background: var(--deep);
    color: var(--cream);
    font-size: 0.65rem;
    font-weight: 500;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    padding: 0.35rem 0.9rem;
    border-radius: 100px;
    margin-bottom: 1rem;
  }

  h1 {
    font-family: 'DM Serif Display', serif;
    font-size: clamp(2.2rem, 8vw, 3.5rem);
    line-height: 1.1;
    color: var(--deep);
    letter-spacing: -0.02em;
  }

  h1 em {
    font-style: italic;
    color: var(--terracotta);
  }

  .subtitle {
    margin-top: 0.7rem;
    color: var(--clay);
    font-size: 0.9rem;
    font-weight: 300;
    letter-spacing: 0.03em;
  }

  .card {
    position: relative;
    z-index: 1;
    background: #fff;
    border-radius: 20px;
    padding: 2rem;
    width: 100%;
    max-width: 480px;
    box-shadow: 0 4px 40px rgba(42,31,26,0.08);
  }

  /* Drop zone */
  .dropzone {
    border: 2px dashed var(--sand);
    border-radius: 14px;
    padding: 2.5rem 1.5rem;
    text-align: center;
    cursor: pointer;
    transition: all 0.25s ease;
    background: var(--cream);
    position: relative;
  }

  .dropzone:hover, .dropzone.drag-over {
    border-color: var(--terracotta);
    background: #fdf4f0;
  }

  .dropzone input[type="file"] {
    position: absolute;
    inset: 0;
    opacity: 0;
    cursor: pointer;
  }

  .drop-icon {
    font-size: 2.5rem;
    margin-bottom: 0.8rem;
    display: block;
    animation: float 3s ease-in-out infinite;
  }

  @keyframes float {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-6px); }
  }

  .drop-text {
    font-size: 0.95rem;
    color: var(--deep);
    font-weight: 500;
  }

  .drop-hint {
    font-size: 0.78rem;
    color: var(--clay);
    margin-top: 0.3rem;
  }

  /* Preview */
  .preview-section {
    display: none;
    margin-top: 1.5rem;
  }

  .preview-section.visible { display: block; }

  .preview-wrap {
    position: relative;
    border-radius: 12px;
    overflow: hidden;
    background: var(--sand);
    aspect-ratio: 4/3;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .preview-wrap img {
    width: 100%;
    height: 100%;
    object-fit: contain;
  }

  .img-info {
    position: absolute;
    bottom: 0.6rem;
    right: 0.6rem;
    background: rgba(42,31,26,0.75);
    color: #fff;
    font-size: 0.7rem;
    padding: 0.25rem 0.55rem;
    border-radius: 100px;
    backdrop-filter: blur(4px);
  }

  /* Settings */
  .settings {
    margin-top: 1.5rem;
    display: none;
    flex-direction: column;
    gap: 1rem;
  }

  .settings.visible {
    display: flex;
  }

  .setting-label {
    font-size: 0.72rem;
    font-weight: 500;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--clay);
    margin-bottom: 0.4rem;
    display: block;
  }

  /* Size presets */
  .size-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 0.5rem;
  }

  .size-btn {
    padding: 0.6rem 0.3rem;
    border: 1.5px solid var(--sand);
    background: none;
    border-radius: 10px;
    cursor: pointer;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.8rem;
    color: var(--deep);
    transition: all 0.2s;
    text-align: center;
  }

  .size-btn .size-num {
    display: block;
    font-weight: 500;
    font-size: 0.85rem;
  }

  .size-btn .size-desc {
    display: block;
    font-size: 0.65rem;
    color: var(--clay);
    margin-top: 0.1rem;
  }

  .size-btn:hover { border-color: var(--terracotta); }
  .size-btn.active {
    background: var(--terracotta);
    border-color: var(--terracotta);
    color: #fff;
  }
  .size-btn.active .size-desc { color: rgba(255,255,255,0.75); }

  /* Custom size */
  .custom-size {
    display: none;
    gap: 0.5rem;
    align-items: center;
  }

  .custom-size.visible { display: flex; }

  .custom-size input {
    flex: 1;
    border: 1.5px solid var(--sand);
    border-radius: 10px;
    padding: 0.55rem 0.8rem;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.85rem;
    color: var(--deep);
    outline: none;
    background: none;
    transition: border-color 0.2s;
  }

  .custom-size input:focus { border-color: var(--terracotta); }
  .custom-size span { color: var(--clay); font-size: 0.85rem; }

  /* Quality slider */
  .quality-row {
    display: flex;
    align-items: center;
    gap: 0.8rem;
  }

  input[type="range"] {
    flex: 1;
    -webkit-appearance: none;
    height: 4px;
    background: var(--sand);
    border-radius: 100px;
    outline: none;
  }

  input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 18px;
    height: 18px;
    border-radius: 50%;
    background: var(--terracotta);
    cursor: pointer;
    box-shadow: 0 2px 6px rgba(193,122,91,0.4);
  }

  .quality-val {
    font-size: 0.85rem;
    font-weight: 500;
    color: var(--terracotta);
    min-width: 2.5rem;
    text-align: right;
  }

  /* Format toggle */
  .format-row {
    display: flex;
    gap: 0.5rem;
  }

  .fmt-btn {
    flex: 1;
    padding: 0.55rem;
    border: 1.5px solid var(--sand);
    background: none;
    border-radius: 10px;
    cursor: pointer;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.8rem;
    font-weight: 500;
    color: var(--deep);
    transition: all 0.2s;
  }

  .fmt-btn:hover { border-color: var(--terracotta); }
  .fmt-btn.active {
    background: var(--deep);
    border-color: var(--deep);
    color: var(--cream);
  }

  /* Process button */
  .process-btn {
    width: 100%;
    margin-top: 1.5rem;
    padding: 1rem;
    background: var(--terracotta);
    color: #fff;
    border: none;
    border-radius: 14px;
    font-family: 'DM Serif Display', serif;
    font-size: 1.15rem;
    letter-spacing: 0.02em;
    cursor: pointer;
    transition: all 0.25s ease;
    position: relative;
    overflow: hidden;
  }

  .process-btn::after {
    content: '';
    position: absolute;
    inset: 0;
    background: rgba(255,255,255,0.15);
    opacity: 0;
    transition: opacity 0.2s;
  }

  .process-btn:hover::after { opacity: 1; }
  .process-btn:active { transform: scale(0.98); }
  .process-btn:disabled { opacity: 0.5; cursor: default; }

  /* Result */
  .result-section {
    display: none;
    margin-top: 1.5rem;
    padding: 1.2rem;
    background: #f0faf4;
    border-radius: 14px;
    border: 1.5px solid #c3e6d0;
  }

  .result-section.visible { display: block; }

  .progress-bar {
    display: none;
    height: 3px;
    background: var(--sand);
    border-radius: 100px;
    margin-top: 0.8rem;
    overflow: hidden;
  }

  .progress-bar.visible { display: block; }

  .result-header {
    display: flex;
    align-items: center;
    gap: 0.5rem;
    font-weight: 500;
    color: #276843;
    margin-bottom: 0.8rem;
    font-size: 0.9rem;
  }

  .result-stats {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 0.5rem;
    margin-bottom: 1rem;
  }

  .stat {
    background: #fff;
    border-radius: 10px;
    padding: 0.65rem 0.8rem;
  }

  .stat-label {
    font-size: 0.65rem;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--clay);
    display: block;
  }

  .stat-val {
    font-weight: 500;
    font-size: 0.9rem;
    color: var(--deep);
    display: block;
    margin-top: 0.15rem;
  }

  .filename-display {
    display: flex;
    align-items: center;
    gap: 0.5rem;
    background: #fff;
    border-radius: 10px;
    padding: 0.65rem 0.8rem;
    margin-bottom: 1rem;
    overflow: hidden;
  }

  .filename-display .stat-label {
    flex-shrink: 0;
  }

  .filename-val {
    font-size: 0.78rem;
    font-weight: 500;
    color: var(--deep);
    word-break: break-all;
    font-family: 'DM Mono', monospace;
    letter-spacing: 0.02em;
  }

  .download-btn {
    width: 100%;
    padding: 0.85rem;
    background: var(--deep);
    color: var(--cream);
    border: none;
    border-radius: 12px;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.9rem;
    font-weight: 500;
    cursor: pointer;
    transition: opacity 0.2s;
    text-decoration: none;
    display: block;
    text-align: center;
  }

  .download-btn:hover { opacity: 0.85; }

  /* Progress */
  .progress-bar {
    display: none;
    height: 3px;
    background: var(--sand);
    border-radius: 100px;
    margin-top: 0.8rem;
    overflow: hidden;
  }

  .progress-bar.visible { display: block; }

  .progress-fill {
    height: 100%;
    background: var(--terracotta);
    border-radius: 100px;
    width: 0%;
    transition: width 0.3s ease;
  }

  /* Privacy note */
  .privacy-note {
    margin-top: 1.5rem;
    text-align: center;
    font-size: 0.72rem;
    color: var(--clay);
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 0.35rem;
  }

  canvas { display: none; }
</style>
</head>
<body>

<header>
  <div class="logo-badge">✦ Photo Cleaner</div>
  <h1>Resize &amp; <em>Clean</em></h1>
  <p class="subtitle">リサイズ ＋ EXIF情報を完全削除　— すべてブラウザ内で処理</p>
</header>

<div class="card">
  <!-- Drop zone -->
  <div class="dropzone" id="dropzone">
    <input type="file" accept="image/*" id="fileInput">
    <span class="drop-icon">🖼️</span>
    <p class="drop-text">写真をタップして選択</p>
    <p class="drop-hint">JPG / PNG / HEIC対応　1枚ずつ処理</p>
  </div>

  <!-- Privacy note -->
  <p class="privacy-note" style="margin-top:1rem;margin-bottom:0;">🔒 写真はブラウザ内のみで処理されます。サーバーに送信されません。<a href="https://github.com/rrfe3/photo-cleaner" target="_blank" rel="noopener" style="margin-left:0.6rem;color:var(--clay);opacity:0.6;transition:opacity 0.2s;" onmouseover="this.style.opacity='1'" onmouseout="this.style.opacity='0.6'" aria-label="GitHub"><svg height="16" viewBox="0 0 16 16" width="16" style="vertical-align:middle;fill:currentColor"><path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0016 8c0-4.42-3.58-8-8-8z"/></svg></a></p>

  <!-- Preview -->
  <div class="preview-section" id="previewSection">
    <div class="preview-wrap">
      <img id="previewImg" src="" alt="preview">
      <span class="img-info" id="imgInfo">—</span>
    </div>
  </div>

  <!-- Settings -->
  <div class="settings" id="settingsSection">

    <!-- Size presets -->
    <div>
      <span class="setting-label">リサイズ</span>
      <div class="size-grid">
        <button class="size-btn active" data-w="1920" data-h="1080">
          <span class="size-num">1920px</span>
          <span class="size-desc">フルHD</span>
        </button>
        <button class="size-btn" data-w="1280" data-h="720">
          <span class="size-num">1280px</span>
          <span class="size-desc">HD</span>
        </button>
        <button class="size-btn" data-w="800" data-h="800">
          <span class="size-num">800px</span>
          <span class="size-desc">Web用</span>
        </button>
        <button class="size-btn" data-w="600" data-h="600">
          <span class="size-num">600px</span>
          <span class="size-desc">SNS</span>
        </button>
        <button class="size-btn" data-w="400" data-h="400">
          <span class="size-num">400px</span>
          <span class="size-desc">サムネ</span>
        </button>
        <button class="size-btn" data-w="custom" data-h="custom">
          <span class="size-num">カスタム</span>
          <span class="size-desc">任意サイズ</span>
        </button>
      </div>
      <div class="custom-size" id="customSize">
        <input type="number" id="customW" placeholder="幅 px" min="1" max="9999">
        <span>×</span>
        <input type="number" id="customH" placeholder="高さ px (任意)" min="1" max="9999">
      </div>
    </div>

    <!-- Quality -->
    <div>
      <span class="setting-label">品質</span>
      <div class="quality-row">
        <input type="range" id="quality" min="10" max="100" value="100">
        <span class="quality-val" id="qualityVal">100%</span>
      </div>
    </div>

    <!-- Format -->
    <div>
      <span class="setting-label">出力フォーマット</span>
      <div class="format-row">
        <button class="fmt-btn active" data-fmt="image/jpeg">JPEG</button>
        <button class="fmt-btn" data-fmt="image/png">PNG</button>
        <button class="fmt-btn" data-fmt="image/webp">WebP</button>
      </div>
    </div>

    <!-- Filename -->
    <div>
      <span class="setting-label">ファイル名</span>
      <div class="format-row">
        <button class="fmt-btn fname-btn active" id="fnameUuid" data-fname="uuid">ランダム</button>
        <button class="fmt-btn fname-btn" id="fnameOrig" data-fname="original">元のファイル名</button>
      </div>
    </div>
  </div>

  <!-- Process -->
  <button class="process-btn" id="processBtn" disabled>
    写真を処理する →
  </button>

  <div class="progress-bar" id="progressBar">
    <div class="progress-fill" id="progressFill"></div>
  </div>

  <!-- Result -->
  <div class="result-section" id="resultSection">
    <div class="result-header">✓ 処理完了！EXIFも削除しました</div>
    <div class="result-stats" id="resultStats"></div>
    <a class="download-btn" id="downloadBtn" href="#" download>ダウンロード</a>
  </div>
</div>



<canvas id="canvas"></canvas>

<script>
  const dropzone = document.getElementById('dropzone');
  const fileInput = document.getElementById('fileInput');
  const previewSection = document.getElementById('previewSection');
  const previewImg = document.getElementById('previewImg');
  const imgInfo = document.getElementById('imgInfo');
  const settingsSection = document.getElementById('settingsSection');
  const processBtn = document.getElementById('processBtn');
  const progressBar = document.getElementById('progressBar');
  const progressFill = document.getElementById('progressFill');
  const resultSection = document.getElementById('resultSection');
  const resultStats = document.getElementById('resultStats');
  const downloadBtn = document.getElementById('downloadBtn');
  const canvas = document.getElementById('canvas');
  const ctx = canvas.getContext('2d');
  const qualitySlider = document.getElementById('quality');
  const qualityVal = document.getElementById('qualityVal');
  const customSize = document.getElementById('customSize');
  const customW = document.getElementById('customW');
  const customH = document.getElementById('customH');

  let currentFile = null;
  let currentDataUrl = null;
  let originalSize = 0;
  let selectedFormat = 'image/jpeg';
  let selectedW = 1920;
  let selectedFilename = 'uuid';

  // Drag over
  dropzone.addEventListener('dragover', e => { e.preventDefault(); dropzone.classList.add('drag-over'); });
  dropzone.addEventListener('dragleave', () => dropzone.classList.remove('drag-over'));
  dropzone.addEventListener('drop', e => {
    e.preventDefault();
    dropzone.classList.remove('drag-over');
    const file = e.dataTransfer.files[0];
    if (file && file.type.startsWith('image/')) loadFile(file);
  });

  fileInput.addEventListener('change', () => {
    if (fileInput.files[0]) loadFile(fileInput.files[0]);
  });

  function loadFile(file) {
    currentFile = file;
    originalSize = file.size;
    const reader = new FileReader();
    reader.onload = (e) => {
      currentDataUrl = e.target.result;
      const img = new Image();
      img.onload = () => {
        previewImg.src = currentDataUrl;
        imgInfo.textContent = `${img.naturalWidth} × ${img.naturalHeight} · ${formatBytes(file.size)}`;
        previewSection.classList.add('visible');
        settingsSection.classList.add('visible');
        processBtn.disabled = false;
        resultSection.classList.remove('visible');
      };
      img.src = currentDataUrl;
    };
    reader.readAsDataURL(file);
  }

  // Quality
  qualitySlider.addEventListener('input', () => {
    qualityVal.textContent = qualitySlider.value + '%';
  });

  // Size presets
  document.querySelectorAll('.size-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.size-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      selectedW = btn.dataset.w;
      if (selectedW === 'custom') {
        customSize.classList.add('visible');
      } else {
        customSize.classList.remove('visible');
      }
    });
  });

  // Format
  document.querySelectorAll('.fmt-btn:not(.fname-btn)').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.fmt-btn:not(.fname-btn)').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      selectedFormat = btn.dataset.fmt;
    });
  });

  // Filename
  document.querySelectorAll('.fname-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.fname-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      selectedFilename = btn.dataset.fname;
    });
  });

  // Process
  processBtn.addEventListener('click', () => {
    if (!currentDataUrl) return;

    processBtn.disabled = true;
    progressBar.classList.add('visible');
    resultSection.classList.remove('visible');

    let prog = 0;
    const tick = setInterval(() => {
      prog = Math.min(prog + Math.random() * 20, 85);
      progressFill.style.width = prog + '%';
    }, 80);

    const img = new Image();
    img.onload = () => {
      // Determine target width
      let tw;
      if (selectedW === 'custom') {
        tw = parseInt(customW.value) || img.naturalWidth;
      } else {
        tw = parseInt(selectedW);
      }

      // Clamp to original size, maintain aspect ratio
      if (tw >= img.naturalWidth) tw = img.naturalWidth;
      const th = Math.round(tw * img.naturalHeight / img.naturalWidth);

      canvas.width = tw;
      canvas.height = th;
      ctx.clearRect(0, 0, tw, th);
      ctx.drawImage(img, 0, 0, tw, th);

      const quality = parseFloat(qualitySlider.value) / 100;
      const ext = selectedFormat === 'image/png' ? 'png' : selectedFormat === 'image/webp' ? 'webp' : 'jpg';
      const outName = selectedFilename === 'uuid'
        ? randomHash() + '.' + ext
        : (currentFile ? currentFile.name.replace(/\.[^.]+$/, '') : 'photo') + '.' + ext;

      const dataUrl = (selectedFormat === 'image/png')
        ? canvas.toDataURL('image/png')
        : canvas.toDataURL(selectedFormat, quality);

      clearInterval(tick);
      progressFill.style.width = '100%';

      setTimeout(() => {
        progressBar.classList.remove('visible');
        progressFill.style.width = '0%';

        // Estimate output size from base64
        const base64 = dataUrl.split(',')[1];
        const outBytes = Math.round(base64.length * 0.75);

        // iPhone対応：画像を直接表示
        const existingOut = document.getElementById('outputImgWrap');
        if (existingOut) existingOut.remove();

        const wrap = document.createElement('div');
        wrap.id = 'outputImgWrap';
        wrap.style.cssText = 'margin-bottom:1rem;border-radius:12px;overflow:hidden;background:var(--sand);';

        const outImg = document.createElement('img');
        outImg.src = dataUrl;
        outImg.style.cssText = 'width:100%;display:block;';
        wrap.appendChild(outImg);
        resultSection.insertBefore(wrap, downloadBtn);

        // ダウンロードボタン（PC用）とiPhone用の案内を切り替え
        const isIOS = /iPhone|iPad|iPod/.test(navigator.userAgent);
        if (isIOS) {
          downloadBtn.textContent = '👆 上の画像を長押し → 写真に追加';
          downloadBtn.removeAttribute('href');
          downloadBtn.removeAttribute('download');
          downloadBtn.style.cssText = 'background:var(--clay);cursor:default;';
        } else {
          downloadBtn.href = dataUrl;
          downloadBtn.download = outName;
          downloadBtn.textContent = 'ダウンロード';
          downloadBtn.style.cssText = '';
        }

        resultStats.innerHTML = `
          <div class="stat"><span class="stat-label">サイズ（前）</span><span class="stat-val">${formatBytes(originalSize)}</span></div>
          <div class="stat"><span class="stat-label">サイズ（後）</span><span class="stat-val">${formatBytes(outBytes)}</span></div>
          <div class="stat"><span class="stat-label">解像度</span><span class="stat-val">${tw} × ${th}px</span></div>
          <div class="stat"><span class="stat-label">削減率</span><span class="stat-val">${Math.max(0, Math.round((1 - outBytes / originalSize) * 100))}%</span></div>
          <div class="filename-display" style="grid-column:1/-1">
            <span class="stat-label" style="margin:0">ファイル名</span>
            <span class="filename-val">${outName}</span>
          </div>
        `;

        resultSection.classList.add('visible');
        processBtn.disabled = false;
      }, 400);
    };
    img.src = currentDataUrl;
  });

  function randomHash() {
    const hex = () => Math.floor(Math.random() * 0xFFFFFFFF).toString(16).toUpperCase().padStart(8, '0');
    const seg = (len) => Math.floor(Math.random() * Math.pow(16, len)).toString(16).toUpperCase().padStart(len, '0');
    return `${hex()}-${seg(4)}-${seg(4)}-${seg(4)}-${hex()}${seg(5)}`;
  }

  function formatBytes(b) {
    if (b < 1024) return b + ' B';
    if (b < 1024 * 1024) return (b / 1024).toFixed(1) + ' KB';
    return (b / 1024 / 1024).toFixed(2) + ' MB';
  }
</script>
